# Local Filesystem Agent Configuration

llm:
  # Supported providers: "lmstudio", "ollama", "openai_compatible"
  provider: "lmstudio"
  base_url: "http://localhost:1234/v1"
  model: "gemma-3-4b-it"
  temperature: 0.3
  max_tokens: 4096

filesystem:
  allowed_paths:
    - "~/Downloads"
    - "~/Documents"
    - "~/Desktop"
    - "~/Pictures"
    - "~/Videos"
    - "~/Music"
  denied_paths:
    - "~/.ssh"
    - "~/.gnupg"
    - "~/.config"
    - "/etc"
    - "/usr"
    - "/var"
    - "/boot"
    - "/sys"
    - "/proc"

database:
  path: "./data/agent.db"

server:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
